// ── 2D tactical view overlay ─────────────────────────────────────────────────
const _radarCanvas = document.getElementById('radar-canvas');
const _radarCtx    = _radarCanvas ? _radarCanvas.getContext('2d') : null;

// widget_name → { left, top, right, bottom (0-100 %), ts: performance.now() }
const _widgetRects = new Map();
const _RECT_STALE_MS = 2000;   // hide a view after 2 s of no send_client_widget_rects calls

function _syncRadarCanvasSize() {
  if (!_radarCanvas) return;
  if (_radarCanvas.width  !== window.innerWidth)  _radarCanvas.width  = window.innerWidth;
  if (_radarCanvas.height !== window.innerHeight) _radarCanvas.height = window.innerHeight;
}
window.addEventListener('resize', _syncRadarCanvasSize);
_syncRadarCanvasSize();
// Zoom via scroll wheel anywhere on the page — radar canvas has pointer-events:none
// so the listener must live on window.
window.addEventListener('wheel', e => {
  e.preventDefault();
  // Over the active 3dview (not the radar): zoom the orbit camera instead.
  if (_view3dActive && !_pointInRadarView(e.clientX, e.clientY)) {
    if (!_v3dManual) _v3dEnterManual();
    _v3dDist *= e.deltaY < 0 ? 0.9 : 1 / 0.9;
    _v3dDist = Math.max(100, Math.min(300000, _v3dDist));
    return;
  }
  _radarZoom *= e.deltaY < 0 ? 1.15 : 1 / 1.15;
  _radarZoom = Math.max(0.05, Math.min(20.0, _radarZoom));
  _renderRadar();
}, { passive: false });

// ── Drag-pan of the radar ─────────────────────────────────────────────────────
// Works on both the 2D-view widget radar and the corner/GM radar. A small drag
// threshold means plain clicks still fall through to the UI underneath — only an
// actual drag starts a pan and swallows the event.
function _currentRadarViews() {
  const activeViews = Array.from(_widgetRects.values());
  if (activeViews.length > 0) return { views: activeViews, isCorner: false };
  // No console 2D view: only the corner radar provides an interaction zone, and
  // only when it's enabled — otherwise there's nothing to hit-test.
  if (!_cornerRadarEnabled) return { views: [], isCorner: false };
  return { views: [_cornerRect(_radarCanvas.width, _radarCanvas.height)], isCorner: true };
}

function _pointInRadarView(px, py) {
  const W = _radarCanvas.width, H = _radarCanvas.height;
  const { views, isCorner } = _currentRadarViews();
  for (const rect of views) {
    const box = _radarBox(W, H, rect, isCorner);
    if (box && px >= box.bx0 && px <= box.bx0 + box.bw &&
        py >= box.by0 && py <= box.by0 + box.bh) return true;
  }
  return false;
}

let _panArmed = false, _panDownX = 0, _panDownY = 0;

window.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (!_pointInRadarView(e.clientX, e.clientY)) return;
  // Arm — but don't claim the event yet, so a plain click still reaches widgets.
  _panArmed = true; _panning = false;
  _panDownX = e.clientX; _panDownY = e.clientY;
  _panStartPX = _radarPanX; _panStartPZ = _radarPanZ;
});

window.addEventListener('mousemove', e => {
  if (_panArmed && !_panning &&
      Math.abs(e.clientX - _panDownX) + Math.abs(e.clientY - _panDownY) > 4) {
    _panning = true;
    document.body.style.cursor = 'grabbing';
  }
  if (_panning) {
    const dx = e.clientX - _panDownX;
    const dy = e.clientY - _panDownY;
    // Grab-the-map: the world point under the cursor follows it. +Z is up, +X right.
    _radarPanX = _panStartPX - dx * _lastWorldPerPx;
    _radarPanZ = _panStartPZ + dy * _lastWorldPerPx;
    _renderRadar();
    e.preventDefault();
    return;
  }
  // Hover hint over a pannable radar.
  if (_pointInRadarView(e.clientX, e.clientY)) document.body.style.cursor = 'grab';
  else if (document.body.style.cursor === 'grab') document.body.style.cursor = '';
});

window.addEventListener('mouseup', () => {
  _panArmed = false;
  if (!_panning) return;
  _panning = false;
  document.body.style.cursor = '';
});

// Double-click recentres the radar (clears the pan offset).
window.addEventListener('dblclick', e => {
  if (!_pointInRadarView(e.clientX, e.clientY)) return;
  _radarPanX = 0; _radarPanZ = 0;
  _renderRadar();
  e.preventDefault();
});

function _sideColor(side) {
  if (!side) return '#888';
  let h = 0;
  for (let i = 0; i < side.length; i++) h = (h * 31 + side.charCodeAt(i)) & 0xffff;
  return `hsl(${(h * 137) % 360},70%,60%)`;
}

// ── Ship sprite cache ─────────────────────────────────────────────────────────
// Dynamic objects draw their top-down art (/ships/<art>256.png) on the radar.
// Plain HTMLImageElements (for 2D-canvas drawImage); the Three-only _loadTex
// helper can't be reused here. Returns the cached <img> once decoded, else null.
// Rotation to add so a sprite's "nose" aligns with its heading. Cosmos top-down
// art points up (north); adjust here if a given art set points elsewhere.
const _SPRITE_ART_OFFSET = 0;
const _spriteCache = new Map();   // art root → { img, ready }
function _shipSprite(art) {
  if (!art) return null;
  let e = _spriteCache.get(art);
  if (e === undefined) {
    e = { img: new Image(), ready: false };
    e.img.onload  = () => { e.ready = true; _renderRadar(); };
    e.img.onerror = () => { e.ready = false; };   // 404 / no art → dot fallback
    e.img.src = `/ships/${art}256.png`;
    _spriteCache.set(art, e);
  }
  return e.ready ? e.img : null;
}

// The 256.png art is white-on-transparent; tint it with the object's side colour
// (both to make it visible and to convey allegiance). Cached per art+colour.
const _tintCache = new Map();   // "art|color" → canvas
function _tintedSprite(art, color) {
  const img = _shipSprite(art);
  if (!img) return null;
  const key = art + '|' + color;
  let c = _tintCache.get(key);
  if (c) return c;
  const w = img.naturalWidth || 256, h = img.naturalHeight || 256;
  c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d');
  g.drawImage(img, 0, 0);
  g.globalCompositeOperation = 'multiply';      // white → colour, keep any shading
  g.fillStyle = color; g.fillRect(0, 0, w, h);
  g.globalCompositeOperation = 'destination-in'; // restore the sprite's alpha mask
  g.drawImage(img, 0, 0);
  _tintCache.set(key, c);
  return c;
}

// Some 2D-view widgets (e.g. helm) arrive with an empty/degenerate rect — there's
// no explicit layout size — which would hide the radar entirely. Fall back to a
// full-panel default so it still renders.
const _DEFAULT_2D_VIEW_RECT = { left: 0, top: 3, right: 100, bottom: 100 };
function _resolve2dViewRect(left, top, right, bottom) {
  if (right - left < 1 || bottom - top < 1) return { ..._DEFAULT_2D_VIEW_RECT };
  return { left, top, right, bottom };
}

// ── cmdWidgetRect — store 2D view position from send_client_widget_rects ──────
function cmdWidgetRect(msg) {
  // Accept rects for our client or the server (clientID "0")
  if (msg.clientID !== '0' && CLIENT_ID !== null && msg.clientID !== String(CLIENT_ID)) {
    log(`widget_rect IGNORED cid=${msg.clientID} mine=${CLIENT_ID} widget=${msg.widget}`, 'dbg');
    return;
  }
  log(`widget_rect OK cid=${msg.clientID} widget=${msg.widget} (${msg.left},${msg.top})→(${msg.right},${msg.bottom})`, 'dbg');
  const r = _resolve2dViewRect(msg.left, msg.top, msg.right, msg.bottom);
  _widgetRects.set(msg.widget, { left: r.left, top: r.top, right: r.right, bottom: r.bottom, ts: performance.now() });
}

// ── Three.js GPU radar renderer ───────────────────────────────────────────────
// A second WebGLRenderer renders terrain and dynamic object dots as GPU
// Points into an offscreen canvas, then blits onto the visible radar overlay.
// The 2D canvas handles backgrounds, rings, labels, and heading arrows.
const _radarCanvas3d = document.createElement('canvas');
const _radarRenderer3d = (() => {
  if (typeof THREE === 'undefined') return null;
  try {
    const r = new THREE.WebGLRenderer({ canvas: _radarCanvas3d, alpha: true });
    r.setClearColor(0x000000, 0);
    r.autoClear = false;
    return r;
  } catch(e) {
    console.error('[radar3d] WebGLRenderer init failed:', e);
    return null;
  }
})();

const _MAX_TERRAIN = 5000;
const _MAX_DYNAMIC = 1000;

let _radarScene3d = null, _radarCamera3d = null;
let _terrainPoints = null, _dynamicPoints = null;
let _terrainPosBuf = null, _terrainColBuf = null;
let _dynamicPosBuf = null, _dynamicColBuf = null;

// Delta state: id → index for O(1) update; reverse map for O(1) swap-with-last removals.
let _terrainCount = 0, _dynamicCount = 0;
const _terrainMap    = new Map();  // id (string) → Float32Array index
const _terrainRevMap = new Map();  // Float32Array index → id (string)
const _terrainMeta   = new Map();  // id (string) → {art, meshscale, y}
const _dynamicMap    = new Map();  // id (string) → Float32Array index
const _dynamicRevMap = new Map();  // Float32Array index → id (string)
const _dynamicMeta   = new Map();  // id (string) → {side, tick_type, fx, fz, name}

// Latest radar overlay data — updated by cmdRadar.
let _radarNavpoints   = [];
let _radarNavareas    = [];
let _radarClientFocus = {};

// Camera lerp — smooths view when ship assignment or focus changes.
let _displayFocusX = null, _displayFocusZ = null;
let _targetFocusX  = null, _targetFocusZ  = null;

// Per-ship filter — set from client_focus.ship_id when our assignment is known.
let _myShipId = null;

// Zoom — scroll wheel on the radar overlay canvas; 1.0 = auto-fit.
let _radarZoom = 1.0;

// Pan — drag inside a 2D-view radar to offset the view from the ship centre, in
// world units. Persists relative to the (ship-tracking) centre; double-click to
// recentre. _lastWorldPerPx is captured each render for screen→world conversion.
let _radarPanX = 0, _radarPanZ = 0;
let _lastWorldPerPx = 1;
let _panning = false, _panStartPX = 0, _panStartPZ = 0;

// Engine 2D-view widget types whose screen rect registers as a radar view area.
const _2D_VIEW_WIDGET_TYPES = new Set(['2dview','science_2d_view','comms_2d_view','weapon_2d_view']);

// Fallback corner radar (drawn when no console 2D view is active).  Optional and
// off by default — toggled by the topbar RADAR button.
let _cornerRadarEnabled = false;

function _cssToRGB(css) {
  _colorCtx.clearRect(0, 0, 1, 1);
  _colorCtx.fillStyle = css;
  _colorCtx.fillRect(0, 0, 1, 1);
  const d = _colorCtx.getImageData(0, 0, 1, 1).data;
  return { r: d[0] / 255, g: d[1] / 255, b: d[2] / 255 };
}

function _initRadar3d() {
  if (!_radarRenderer3d) return;
  _radarScene3d  = new THREE.Scene();
  // Camera looks along -Z; world X maps to Three.js X, world Z maps to Three.js Y.
  // top/bottom are swapped so world +Z = screen up after the WebGL → canvas blit.
  _radarCamera3d = new THREE.OrthographicCamera(-1, 1, -1, 1, -1, 1);

  const tGeo = new THREE.BufferGeometry();
  _terrainPosBuf = new Float32Array(_MAX_TERRAIN * 3);
  _terrainColBuf = new Float32Array(_MAX_TERRAIN * 3);
  tGeo.setAttribute('position', new THREE.BufferAttribute(_terrainPosBuf, 3));
  tGeo.setAttribute('color',    new THREE.BufferAttribute(_terrainColBuf, 3));
  tGeo.setDrawRange(0, 0);
  _terrainPoints = new THREE.Points(tGeo,
    new THREE.PointsMaterial({ size: 3, vertexColors: true, sizeAttenuation: false }));
  _radarScene3d.add(_terrainPoints);

  const dGeo = new THREE.BufferGeometry();
  _dynamicPosBuf = new Float32Array(_MAX_DYNAMIC * 3);
  _dynamicColBuf = new Float32Array(_MAX_DYNAMIC * 3);
  dGeo.setAttribute('position', new THREE.BufferAttribute(_dynamicPosBuf, 3));
  dGeo.setAttribute('color',    new THREE.BufferAttribute(_dynamicColBuf, 3));
  dGeo.setDrawRange(0, 0);
  _dynamicPoints = new THREE.Points(dGeo,
    new THREE.PointsMaterial({ size: 7, vertexColors: true, sizeAttenuation: false }));
  // Dynamic objects are drawn as art sprites (or a dot fallback) by the 2D overlay,
  // so the GPU dot layer would just double-draw under each sprite. Keep the buffer
  // (the overlay reads positions from it) but don't render it.
  _dynamicPoints.visible = false;
  _radarScene3d.add(_dynamicPoints);
}
_initRadar3d();

// ── cmdRadarTerrain — full terrain layer replacement ──────────────────────────
function cmdRadarTerrain(msg) {
  if (!_terrainPoints) return;
  const objects = msg.objects || [];
  _terrainMap.clear();
  _terrainRevMap.clear();
  _terrainMeta.clear();
  for (let i = 0; i < objects.length && i < _MAX_TERRAIN; i++) {
    const o = objects[i];
    const {r, g, b} = _cssToRGB(_sideColor(o.side));
    const base = i * 3;
    _terrainPosBuf[base]     = o.x;
    _terrainPosBuf[base + 1] = o.z;   // world Z → Three.js Y
    _terrainPosBuf[base + 2] = 0;
    _terrainColBuf[base]     = r;
    _terrainColBuf[base + 1] = g;
    _terrainColBuf[base + 2] = b;
    _terrainMap.set(o.id, i);
    _terrainRevMap.set(i, o.id);
    _terrainMeta.set(o.id, {
      art: o.art || '', meshscale: o.meshscale ?? 1, y: o.y ?? 0, q: o.q || null,
      nebula: !!o.nebula, radius: o.radius || 0, density: o.density || 0, seed: o.seed || 1,
      color: o.color || null, color2: o.color2 || null, swirl: o.swirl || 0, warp: o.warp || 0,
    });
  }
  _terrainCount = Math.min(objects.length, _MAX_TERRAIN);
  _terrainPoints.geometry.setDrawRange(0, _terrainCount);
  _terrainPoints.geometry.attributes.position.needsUpdate = true;
  _terrainPoints.geometry.attributes.color.needsUpdate    = true;
  _buildNebula();   // rebuild nebula particle clouds for the new terrain set
  _renderRadar();
}

// ── cmdRadar — delta update for active (NPC/PLAYER) objects ──────────────────
function cmdRadar(msg) {
  if (!_radarCtx) return;

  // Always process nav + focus — needed to discover our own ship_id before the
  // first matching per-ship message arrives.
  if (msg.navpoints !== undefined) _radarNavpoints = msg.navpoints;
  if (msg.navareas  !== undefined) _radarNavareas  = msg.navareas;
  if (msg.client_focus) {
    // Server sends complete client_focus each tick — replace rather than merge
    // so stale entries for disconnected clients are cleared automatically.
    _radarClientFocus = msg.client_focus;
    const myKey = CLIENT_ID !== null ? String(CLIENT_ID) : '0';
    const entry = msg.client_focus[myKey];
    if (entry && entry.ship_id) _myShipId = entry.ship_id;
  }

  // Per-ship filter: only process the object delta for our assigned ship.
  // ship_id "0" = GM / server view, consumed by unassigned clients (lobby/spectator).
  const msgShipId = msg.ship_id || '0';
  const isGMView    = msgShipId === '0';
  const isMyShip    = _myShipId !== null && msgShipId === _myShipId;
  const isUnassigned = _myShipId === null;

  if ((!isGMView && !isMyShip) || (isGMView && !isUnassigned)) {
    // Not our message — nav/focus already updated; redraw for camera lerp.
    _renderRadar();
    return;
  }

  if (_dynamicPoints) {
    const removed = msg.removed || [];
    const changed  = msg.changed  || [];

    for (const id of removed) {
      const idx = _dynamicMap.get(id);
      if (idx === undefined) continue;
      _dynamicMap.delete(id);
      _dynamicMeta.delete(id);
      _dynamicRevMap.delete(idx);
      _dynamicCount--;
      if (idx !== _dynamicCount && _dynamicCount > 0) {
        // Move last element into the vacated slot.
        const srcBase = _dynamicCount * 3;
        const dstBase = idx * 3;
        _dynamicPosBuf[dstBase]     = _dynamicPosBuf[srcBase];
        _dynamicPosBuf[dstBase + 1] = _dynamicPosBuf[srcBase + 1];
        _dynamicPosBuf[dstBase + 2] = _dynamicPosBuf[srcBase + 2];
        _dynamicColBuf[dstBase]     = _dynamicColBuf[srcBase];
        _dynamicColBuf[dstBase + 1] = _dynamicColBuf[srcBase + 1];
        _dynamicColBuf[dstBase + 2] = _dynamicColBuf[srcBase + 2];
        const movedId = _dynamicRevMap.get(_dynamicCount);
        if (movedId !== undefined) {
          _dynamicMap.set(movedId, idx);
          _dynamicRevMap.set(idx, movedId);
          _dynamicRevMap.delete(_dynamicCount);
        }
      }
    }

    let colorsDirty = false;
    for (const o of changed) {
      let idx = _dynamicMap.get(o.id);
      if (idx === undefined) {
        if (_dynamicCount >= _MAX_DYNAMIC) continue;
        idx = _dynamicCount++;
        _dynamicMap.set(o.id, idx);
        _dynamicRevMap.set(idx, o.id);
        const {r, g, b} = _cssToRGB(_sideColor(o.side));
        const cb = idx * 3;
        _dynamicColBuf[cb] = r; _dynamicColBuf[cb+1] = g; _dynamicColBuf[cb+2] = b;
        colorsDirty = true;
        _dynamicMeta.set(o.id, {
          side: o.side, tick_type: o.tick_type,
          fx: o.fx ?? 0, fz: o.fz ?? 0, name: o.name || '', art: o.art || '',
          y: o.y ?? 0, meshscale: o.meshscale ?? 1, q: o.q || null,
        });
      } else {
        const meta = _dynamicMeta.get(o.id);
        if (meta && o.fx !== undefined) { meta.fx = o.fx; meta.fz = o.fz; }
        if (meta && o.q) meta.q = o.q;
      }
      const pb = idx * 3;
      _dynamicPosBuf[pb]     = o.x;
      _dynamicPosBuf[pb + 1] = o.z;
      _dynamicPosBuf[pb + 2] = 0;
    }

    _dynamicPoints.geometry.setDrawRange(0, _dynamicCount);
    _dynamicPoints.geometry.attributes.position.needsUpdate = true;
    if (colorsDirty) _dynamicPoints.geometry.attributes.color.needsUpdate = true;
  }

  _renderRadar();
}

// ── Radar layout helpers ──────────────────────────────────────────────────────
function _cornerRect(W, H) {
  const margin = 12, sz = Math.min(W, H) * 0.28;
  return {
    left:   (W - sz - margin) / W * 100,
    top:    (H - sz - margin) / H * 100,
    right:  (W - margin) / W * 100,
    bottom: (H - margin) / H * 100,
  };
}

function _rectPx(W, H, rect) {
  return {
    x0: rect.left  / 100 * W,  y0: rect.top    / 100 * H,
    x1: rect.right / 100 * W,  y1: rect.bottom / 100 * H,
  };
}

function _computeWorldBounds(focusX, focusZ) {
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  if (_dynamicPosBuf) {
    for (let i = 0; i < _dynamicCount; i++) {
      const b = i * 3;
      const wx = _dynamicPosBuf[b], wz = _dynamicPosBuf[b + 1];
      if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
      if (wz < minZ) minZ = wz; if (wz > maxZ) maxZ = wz;
    }
  }
  // Terrain must also contribute to the auto-fit so zooming the corner radar
  // correctly reveals asteroid fields and other static objects spread across
  // the scene, not just the dynamic-object cluster.
  if (_terrainPosBuf) {
    for (let i = 0; i < _terrainCount; i++) {
      const b = i * 3;
      const wx = _terrainPosBuf[b], wz = _terrainPosBuf[b + 1];
      if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
      if (wz < minZ) minZ = wz; if (wz > maxZ) maxZ = wz;
    }
  }
  for (const n of _radarNavpoints) {
    if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x;
    const nz = n.z ?? 0;
    if (nz < minZ) minZ = nz; if (nz > maxZ) maxZ = nz;
  }
  if (!isFinite(minX)) { minX = -5000; maxX = 5000; minZ = -5000; maxZ = 5000; }
  let cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
  if (focusX != null && isFinite(focusX)) {
    cx = focusX;
    cz = focusZ;
  } else {
    // Fallback: center on first PLAYER-type object when client_focus not yet received.
    for (const [id, meta] of _dynamicMeta) {
      if (meta.tick_type === 'PLAYER' || meta.tick_type === 'player') {
        const idx = _dynamicMap.get(id);
        if (idx !== undefined && idx < _dynamicCount) {
          const b = idx * 3;
          cx = _dynamicPosBuf[b];
          cz = _dynamicPosBuf[b + 1];
          break;
        }
      }
    }
  }
  // Inside a 2D view widget, pin halfSpan to CULL_RADIUS so the radar shows the
  // ship's local neighbourhood at a fixed scale instead of auto-fitting the entire
  // visible object set (which makes any movement imperceptible).
  const hasActiveView = _widgetRects.size > 0;
  const halfSpan = (hasActiveView && focusX != null)
    ? 35_000 / _radarZoom
    : Math.max(maxX - minX, maxZ - minZ, 1000) * 0.675 / _radarZoom;
  // Anchor for the range rings = the tracked centre (ship / centroid) before pan,
  // so the rings slide with the world when panning instead of staying screen-locked.
  const ax = cx, az = cz;
  // Drag-pan offset (world units) — applied to whichever radar is on screen
  // (2D-view or corner). Double-click clears it back to the tracked centre.
  cx += _radarPanX;
  cz += _radarPanZ;
  return { cx, cz, halfSpan, ax, az };
}

// Pixel box the world is projected into, shared by the 2D chrome/overlay, the
// Three.js viewport and the pan hit-test so terrain dots, dynamic dots, arrows,
// navpoints and rings all occupy the same coordinate space and clip identically.
//   • corner radar  → framed, aspect-locked square with a label header
//   • 2D-view widget → the entire widget rect (uniform world scale, so range
//     rings stay circular and the longer axis simply shows more world)
// Returns { bx0, by0, bw, bh, fit } in 2D-canvas pixels, or null if too small.
// `fit` is the dimension the outer range ring (radius halfSpan) maps to.
function _radarBox(W, H, rect, isCorner) {
  const { x0, y0, x1, y1 } = _rectPx(W, H, rect);
  const rw = x1 - x0, rh = y1 - y0;
  if (rw < 4 || rh < 4) return null;
  if (isCorner) {
    const pad    = Math.min(rw, rh) * 0.05 + 6;
    const labelH = Math.max(18, rh * 0.08);
    const drawH  = rh - labelH - 2 * pad;
    const drawW  = rw - 2 * pad;
    const S      = Math.min(drawW, drawH);
    return { bx0: x0 + pad, by0: y0 + labelH + pad + (drawH - S), bw: S, bh: S, fit: S };
  }
  return { bx0: x0, by0: y0, bw: rw, bh: rh, fit: Math.min(rw, rh) };
}

// Uniform-scale world→pixel projection for a box. The outer ring (radius
// halfSpan) maps to fit/2 px; the longer box axis shows proportionally more world.
function _radarProj(box, cx, cz, halfSpan) {
  const scale = box.fit / (2 * halfSpan);
  const cxp = box.bx0 + box.bw / 2;
  const cyp = box.by0 + box.bh / 2;
  return {
    scale, cxp, cyp,
    toX: wx => cxp + (wx - cx) * scale,
    toY: wz => cyp - (wz - cz) * scale,   // +Z up
  };
}

function _drawRadarChrome(ctx, W, H, rect, cx, cz, halfSpan, isCorner, ax, az) {
  const { x0, y0, x1, y1 } = _rectPx(W, H, rect);
  const rw = x1 - x0, rh = y1 - y0;
  if (rw < 4 || rh < 4) return;
  const box = _radarBox(W, H, rect, isCorner);
  if (!box) return;
  const { toX, toY, scale } = _radarProj(box, cx, cz, halfSpan);

  ctx.fillStyle = '#000c1e';
  ctx.fillRect(x0, y0, rw, rh);

  if (isCorner) {
    const labelH = Math.max(18, rh * 0.08);
    ctx.fillStyle = '#003366';
    ctx.fillRect(x0, y0, rw, labelH);
    ctx.fillStyle = '#00e5ff';
    ctx.font = `bold ${Math.max(10, labelH * 0.55)}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('RADAR', x0 + rw / 2, y0 + labelH / 2);
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  // Clip rings + crosshair to the drawable box so they match the dot scissor.
  ctx.save();
  ctx.beginPath(); ctx.rect(box.bx0, box.by0, box.bw, box.bh); ctx.clip();

  ctx.setLineDash([4, 6]);
  const rings = [0.25, 0.5, 1.0];
  const ringColors = ['rgba(0,180,80,0.15)', 'rgba(0,180,80,0.2)', 'rgba(0,180,80,0.25)'];
  // Centre the range rings on the tracked anchor (ship/centroid) so they pan with
  // the world; fall back to the view centre if no anchor was supplied.
  const ringX = ax != null ? ax : cx, ringZ = az != null ? az : cz;
  const cx_px = toX(ringX), cy_px = toY(ringZ);
  for (let i = 0; i < rings.length; i++) {
    const rpx = rings[i] * halfSpan * scale;
    ctx.strokeStyle = ringColors[i];
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx_px, cy_px, rpx, 0, 2 * Math.PI); ctx.stroke();
  }
  ctx.setLineDash([]);

  const ox = toX(0), oy = toY(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ox, box.by0); ctx.lineTo(ox, box.by0 + box.bh);
  ctx.moveTo(box.bx0, oy); ctx.lineTo(box.bx0 + box.bw, oy);
  ctx.stroke();
  ctx.restore();
}

function _drawRadarOverlay(ctx, W, H, rect, cx, cz, halfSpan, isCorner) {
  const { x0, y0, x1, y1 } = _rectPx(W, H, rect);
  const rw = x1 - x0, rh = y1 - y0;
  if (rw < 4 || rh < 4) return;
  const box = _radarBox(W, H, rect, isCorner);
  if (!box) return;
  const { toX, toY } = _radarProj(box, cx, cz, halfSpan);
  const fontSize = Math.max(8, Math.min(12, rh * 0.025));
  const minR = isCorner ? 5 : 4, pMinR = isCorner ? 8 : 6;

  // Clip navpoints + arrows to the same box the dots are scissored to.
  ctx.save();
  ctx.beginPath(); ctx.rect(box.bx0, box.by0, box.bw, box.bh); ctx.clip();

  // Navareas: quad regions drawn under the navpoints/ships, with a faint fill,
  // outline, and a centered label in the area's color.
  for (const a of _radarNavareas) {
    const pts = a.points;
    if (!pts || pts.length < 3) continue;
    const col = a.color || '#4fa3ff';
    // The engine's 4 navarea corners arrive in triangle-strip ("Z") order
    // (TL, TR, BL, BR) — walk them 0,1,3,2 so the outline is a proper quad and
    // not a self-crossing bowtie.  Other vertex counts draw in given order.
    const order = pts.length === 4 ? [0, 1, 3, 2] : pts.map((_, i) => i);
    ctx.beginPath();
    ctx.moveTo(toX(pts[order[0]][0]), toY(pts[order[0]][1]));
    for (let i = 1; i < order.length; i++) ctx.lineTo(toX(pts[order[i]][0]), toY(pts[order[i]][1]));
    ctx.closePath();
    ctx.save();
    ctx.globalAlpha = 0.12; ctx.fillStyle = col; ctx.fill();
    ctx.restore();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.stroke();
    if (a.name) {
      let mx = 0, my = 0;
      for (const p of pts) { mx += toX(p[0]); my += toY(p[1]); }
      mx /= pts.length; my /= pts.length;
      ctx.fillStyle = col;
      ctx.font = `${fontSize}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(a.name, mx, my);
      ctx.textAlign = 'left';
    }
  }

  ctx.fillStyle = '#ffe44a';
  ctx.font = `${fontSize}px monospace`;
  for (const n of _radarNavpoints) {
    const px = toX(n.x), py = toY(n.z ?? 0);
    ctx.fillRect(px - 3, py - 3, 6, 6);
    if (n.name) { ctx.textBaseline = 'middle'; ctx.fillText(n.name, px + 5, py); }
  }

  // Fixed-size ship icons (independent of zoom); names only when zoomed in.
  const baseNpc    = isCorner ? 26 : 48;
  const basePlayer = isCorner ? 38 : 68;
  // Show names from the default 2D-view zoom (halfSpan 35000) inward; hide only on
  // a wide overview zoom-out where labels would overlap into clutter.
  const showNames  = halfSpan < 50000;
  for (const [id, meta] of _dynamicMeta) {
    const idx = _dynamicMap.get(id);
    if (idx === undefined || idx >= _dynamicCount) continue;
    const base = idx * 3;
    const px = toX(_dynamicPosBuf[base]), py = toY(_dynamicPosBuf[base + 1]);
    const col = _sideColor(meta.side);
    const isPlayer = meta.tick_type === 'PLAYER' || meta.tick_type === 'player';
    const s = isPlayer ? basePlayer : baseNpc;
    const sprite = _tintedSprite(meta.art, col);
    if (sprite) {
      // Draw the top-down art rotated to face its heading.
      const ang = Math.atan2(meta.fx, meta.fz) + _SPRITE_ART_OFFSET;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(ang);
      ctx.drawImage(sprite, -s / 2, -s / 2, s, s);
      ctx.restore();
    } else {
      // Fallback until the sprite loads (or for objects with no art): dot + arrow.
      const r = isPlayer ? Math.max(pMinR, rw * 0.012) : Math.max(minR, rw * 0.006);
      const alen = r + Math.max(8, rw * 0.015);
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(px, py, r, 0, 2 * Math.PI); ctx.fill();
      ctx.strokeStyle = col; ctx.lineWidth = isPlayer ? 2 : 1.5;
      ctx.beginPath(); ctx.moveTo(px, py);
      ctx.lineTo(px + meta.fx * alen, py - meta.fz * alen); ctx.stroke();
    }
    if (showNames && meta.name) {
      ctx.fillStyle = col;
      ctx.font = `${Math.max(8, fontSize)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(meta.name, px, py - s / 2 - 1);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }
  }
  ctx.restore();

  const totalCount = _dynamicCount + _terrainCount;
  if (totalCount > 0) {
    ctx.fillStyle = 'rgba(0,229,255,0.6)';
    ctx.font = `${Math.max(8, fontSize - 1)}px monospace`;
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${_dynamicCount}+${_terrainCount} obj`, x0 + 4, y1 - 3);
  }

  ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2;
  ctx.strokeRect(x0 + 1, y0 + 1, rw - 2, rh - 2);
}

// ── _renderRadar — composites 2D chrome + Three.js dots onto the radar canvas ─
function _renderRadar() {
  if (!_radarCtx) return;
  _syncRadarCanvasSize();
  const W = _radarCanvas.width, H = _radarCanvas.height;
  _radarCtx.clearRect(0, 0, W, H);

  const myKey   = CLIENT_ID !== null ? String(CLIENT_ID) : '0';
  const myFocus = _radarClientFocus[myKey] || null;
  if (myFocus) {
    _targetFocusX = myFocus.x;
    _targetFocusZ = myFocus.z;
    if (myFocus.ship_id) _myShipId = myFocus.ship_id;
  }
  const LERP = 0.06;
  if (_displayFocusX === null && _targetFocusX !== null) {
    _displayFocusX = _targetFocusX;
    _displayFocusZ = _targetFocusZ;
  } else if (_targetFocusX !== null) {
    _displayFocusX += (_targetFocusX - _displayFocusX) * LERP;
    _displayFocusZ += (_targetFocusZ - _displayFocusZ) * LERP;
  }
  const focusX = _displayFocusX;
  const focusZ = _displayFocusZ;

  const activeViews = Array.from(_widgetRects.values());

  // No console 2D view active: draw the fallback corner radar only if enabled,
  // otherwise leave the radar canvas blank (already cleared above).
  if (activeViews.length === 0 && !_cornerRadarEnabled) return;

  const views    = activeViews.length > 0 ? activeViews : [_cornerRect(W, H)];
  const isCorner = activeViews.length === 0;
  const { cx, cz, halfSpan, ax, az } = _computeWorldBounds(focusX, focusZ);

  // Capture world-units-per-pixel from the primary view so drag-pan can convert
  // screen deltas to world deltas at the current zoom.
  const _primaryBox = _radarBox(W, H, views[0], isCorner);
  if (_primaryBox) _lastWorldPerPx = (2 * halfSpan) / _primaryBox.fit;

  // 2D chrome: backgrounds, rings, crosshairs.
  for (const rect of views) _drawRadarChrome(_radarCtx, W, H, rect, cx, cz, halfSpan, isCorner, ax, az);

  // Three.js dots: terrain + dynamic.
  if (_radarRenderer3d && _radarScene3d) {
    _radarRenderer3d.setSize(W, H, false);
    _radarRenderer3d.clear();
    for (const rect of views) {
      // Project into the exact same box as the 2D chrome/overlay so terrain dots
      // line up with dynamic dots, arrows and navpoints and clip identically.
      const box = _radarBox(W, H, rect, isCorner);
      if (!box) continue;
      const { bx0, by0, bw, bh } = box;
      // Uniform world scale: halfSpan maps to fit/2 px, so the world half-extent
      // in each axis is proportional to that axis's pixel size.
      const halfW = bw * halfSpan / box.fit;
      const halfH = bh * halfSpan / box.fit;
      _radarCamera3d.left   = cx - halfW;
      _radarCamera3d.right  = cx + halfW;
      // top = cz + halfH puts world +Z at screen top, matching toY() in the
      // 2D overlay (which the previous cz-halfSpan ordering mirrored).
      _radarCamera3d.top    = cz + halfH;
      _radarCamera3d.bottom = cz - halfH;
      _radarCamera3d.updateProjectionMatrix();
      // WebGL viewport origin is bottom-left; the box's 2D top by0 maps to
      // GL bottom H-(by0+bh).
      const vy = H - (by0 + bh);
      _radarRenderer3d.setViewport(bx0, vy, bw, bh);
      _radarRenderer3d.setScissor(bx0, vy, bw, bh);
      _radarRenderer3d.setScissorTest(true);
      _radarRenderer3d.render(_radarScene3d, _radarCamera3d);
    }
    _radarCtx.drawImage(_radarCanvas3d, 0, 0);
  }

  // 2D overlays: navpoints, heading arrows, labels, border.
  for (const rect of views) _drawRadarOverlay(_radarCtx, W, H, rect, cx, cz, halfSpan, isCorner);

  // NO SIGNAL overlay when corner radar has nothing.
  if (isCorner && _dynamicCount === 0 && _radarNavpoints.length === 0
      && _radarNavareas.length === 0 && _terrainCount === 0) {
    const { x0, y0, x1, y1 } = _rectPx(W, H, views[0]);
    const sz = Math.min(x1 - x0, y1 - y0);
    _radarCtx.fillStyle = 'rgba(255,60,60,0.7)';
    _radarCtx.font = `bold ${Math.max(11, sz * 0.1)}px monospace`;
    _radarCtx.textAlign = 'center'; _radarCtx.textBaseline = 'middle';
    _radarCtx.fillText('NO SIGNAL', (x0 + x1) / 2, (y0 + y1) / 2);
    _radarCtx.textAlign = 'left'; _radarCtx.textBaseline = 'alphabetic';
  }
}


// ── Cinematic 3D main-screen view ─────────────────────────────────────────────
// A perspective scene rendered full-window behind the GUI. Object positions are
// reused from the radar buffers on the y=0 plane; cinematic_control supplies the
// camera (dolly) and look-at (target) world positions, streamed each tick.
const _view3dCanvas = document.getElementById('view3d-canvas');
let _view3dRenderer = null, _view3dScene = null, _view3dCamera = null, _view3dPoints = null;
let _view3dActive = false;
const _V3D_MAX = 8000;
let _view3dPosBuf = null, _view3dColBuf = null;
// Per-art instancing: every art root draws all of its near objects (ships and
// asteroids) in a single InstancedMesh. art → { base, inst, cap, pending, failed }.
const _instArt = new Map();
// Object ids drawn as an instance this frame — the point layer skips these.
const _view3dMeshedIds = new Set();
// Scratch math objects (allocated in _initView3d once THREE is known to exist).
let _m4 = null, _qrot = null, _vpos = null, _vscale = null, _UP = null;
// Added to a mesh's heading yaw if a model's nose isn't +Z. Calibration knob.
const _MESH_YAW_OFFSET = 0;
// Distance LOD: beyond this many world units from the camera a hull drops to its
// point marker (cheaper, and a full mesh would be only a few px anyway).
const _V3D_LOD_NEAR = 50000;
// Target (from server) and smoothed display camera/look-at, lerped each frame.
let _v3dCam = [0, 150, -500], _v3dTgt = [0, 0, 0];
let _v3dDispCam = null, _v3dDispTgt = null;
let _view3dStars = null, _view3dHighlight = null;
// Manual orbit camera (debug look-around): drag = orbit, wheel = zoom,
// double-click = back to the server-driven cinematic camera.
let _v3dManual = false, _v3dYaw = 0, _v3dPitch = 0.3, _v3dDist = 1500;
let _v3dDrag = false, _v3dDragX = 0, _v3dDragY = 0;

// Procedural starfield backdrop: points on a large sphere, translated with the
// camera each frame so they read as fixed at infinity (a cheap, asset-free
// stand-in for the engine cube-cross skybox).
function _makeStarfield() {
  const N = 1500, R = 2_000_000;
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const u = Math.random() * 2 - 1, t = Math.random() * Math.PI * 2;
    const s = Math.sqrt(1 - u * u);
    pos[i*3] = R * s * Math.cos(t); pos[i*3+1] = R * u; pos[i*3+2] = R * s * Math.sin(t);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(g, new THREE.PointsMaterial({ color: 0xcfe6ff, size: 2, sizeAttenuation: false }));
}

// ── Skybox (engine cube-cross PNG) ────────────────────────────────────────────
// The engine ships a 4x3 cube cross (e.g. 8192x6144, six 2048 faces). Cross
// tiles (col,row, origin top-left) and the Three.js wall each feeds — the engine
// "front"/"back" tiles map to -Z/+Z, so they're cross-assigned below:
//        col0     col1        col2     col3
//  row0    ·    tile→ -Z back   ·        ·
//  row1  -X left  +Y up      +X right  -Y down
//  row2    ·    tile→ +Z front  ·        ·
// Per-face rotations below were calibrated in-browser against the engine.
let _skyboxMesh = null, _skyboxName = null, _skyboxImg = null;
const _SKYBOX_FACE_SIZE = 1024;
// Calibrated orientation (tune live with , / . to rotate the faced wall, \ flip).
const _SKYBOX_FACE_ROT = { right: 90, left: 270, up: 0, down: 180, front: 0, back: 180 };
let _SKYBOX_FLIP = false;

function _sliceFace(img, col, row, fw, fh, rotDeg, flip) {
  const S = _SKYBOX_FACE_SIZE;
  const c = document.createElement('canvas'); c.width = S; c.height = S;
  const g = c.getContext('2d');
  g.translate(S / 2, S / 2);
  if (flip)   g.scale(-1, 1);
  if (rotDeg) g.rotate(rotDeg * Math.PI / 180);
  g.drawImage(img, col * fw, row * fh, fw, fh, -S / 2, -S / 2, S, S);
  return c;
}

// (Re)build the box materials from the cached cross image — no network fetch, so
// it's cheap enough to call on every calibration keypress.
function _applySkyboxFaces() {
  if (!_skyboxImg || !_view3dScene) return;
  const img = _skyboxImg, fw = img.width / 4, fh = img.height / 3, R = _SKYBOX_FACE_ROT, F = _SKYBOX_FLIP;
  // Box material order is +X,-X,+Y,-Y,+Z,-Z → right,left,up,down,front,back.
  // +Z(front) takes the bottom cross tile (1,2); -Z(back) the top (1,0).
  const tiles = [
    _sliceFace(img, 2, 1, fw, fh, R.right, F),
    _sliceFace(img, 0, 1, fw, fh, R.left,  F),
    _sliceFace(img, 1, 1, fw, fh, R.up,    F),
    _sliceFace(img, 3, 1, fw, fh, R.down,  F),
    _sliceFace(img, 1, 2, fw, fh, R.front, F),
    _sliceFace(img, 1, 0, fw, fh, R.back,  F),
  ];
  const mats = tiles.map(c => new THREE.MeshBasicMaterial({
    map: new THREE.CanvasTexture(c), side: THREE.BackSide, depthTest: false, depthWrite: false,
  }));
  if (_skyboxMesh) _view3dScene.remove(_skyboxMesh);
  const SZ = 2_000_000;
  _skyboxMesh = new THREE.Mesh(new THREE.BoxGeometry(SZ, SZ, SZ), mats);
  _skyboxMesh.renderOrder = -1;        // draw first, behind everything
  _skyboxMesh.frustumCulled = false;
  _view3dScene.add(_skyboxMesh);
}

function _buildSkybox(name) {
  if (!_view3dScene || typeof THREE === 'undefined') return;
  const base = String(name).split(/[\\/]/).pop();   // bare-name → /<name>.png in graphics
  const img = new Image();
  img.onload = () => {
    if (_skyboxName !== name) return;   // a newer skybox arrived while loading
    _skyboxImg = img;
    _applySkyboxFaces();
    if (_view3dStars) _view3dStars.visible = false;   // real sky replaces the procedural stars
    log(`[skybox] ${base}.png loaded — calibrate: , / . rotate faced wall, \\ flip`, 'dbg');
  };
  img.onerror = () => log(`[skybox] failed: /${base}.png (keeping starfield)`, 'dbg');
  img.src = '/' + base + '.png';
}

// Live skybox calibration: rotate whichever wall the camera is currently facing.
function _skyboxFacedWall() {
  if (!_v3dDispCam || !_v3dDispTgt) return 'front';
  const fx = _v3dDispTgt[0]-_v3dDispCam[0], fy = _v3dDispTgt[1]-_v3dDispCam[1], fz = _v3dDispTgt[2]-_v3dDispCam[2];
  const ax = Math.abs(fx), ay = Math.abs(fy), az = Math.abs(fz);
  if (ax >= ay && ax >= az) return fx > 0 ? 'right' : 'left';
  if (ay >= ax && ay >= az) return fy > 0 ? 'up' : 'down';
  return fz > 0 ? 'front' : 'back';
}
window.addEventListener('keydown', e => {
  if (!_view3dActive || !_skyboxImg) return;
  let changed = true;
  if (e.key === ',' || e.key === '.') {
    const w = _skyboxFacedWall();
    _SKYBOX_FACE_ROT[w] = ((_SKYBOX_FACE_ROT[w] + (e.key === '.' ? 90 : -90)) % 360 + 360) % 360;
  } else if (e.key === '\\') {
    _SKYBOX_FLIP = !_SKYBOX_FLIP;
  } else { changed = false; }
  if (!changed) return;
  e.preventDefault();
  _applySkyboxFaces();
  log(`[skybox] flip=${_SKYBOX_FLIP} rot=${JSON.stringify(_SKYBOX_FACE_ROT)}`, 'dbg');
});

// ── cmdSkybox — set/clear the cinematic backdrop ──────────────────────────────
function cmdSkybox(msg) {
  const name = msg.name || null;
  if (name === _skyboxName) return;
  _skyboxName = name;
  if (!name) {   // cleared → restore the starfield
    if (_skyboxMesh && _view3dScene) { _view3dScene.remove(_skyboxMesh); _skyboxMesh = null; }
    if (_view3dStars) _view3dStars.visible = true;
    return;
  }
  _buildSkybox(name);
}

// ── Nebula GPU point-sprite cloud ─────────────────────────────────────────────
// Each nebula scatters soft additive particles (seeded by the engine's
// random_seed for reproducibility); a custom shader draws soft discs, swirls
// them around the cloud centre and wobbles them over time. One draw call total.
let _nebPoints = null, _nebMat = null;
const _NEB_MAX = 24000;
let _nebPosBuf, _nebCenBuf, _nebColBuf, _nebSizeBuf, _nebPhaseBuf, _nebSwirlBuf, _nebWarpBuf;

const _NEB_VS = `
  attribute vec3 center;
  attribute vec3 acolor;
  attribute float size;
  attribute float phase;
  attribute float swirlAmt;
  attribute float warpAmt;
  uniform float time;
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    vec3 off = position - center;
    float ang = swirlAmt * time * 0.08;
    float ca = cos(ang), sa = sin(ang);
    vec3 r = vec3(off.x*ca - off.z*sa, off.y, off.x*sa + off.z*ca);
    vec3 wob = warpAmt * vec3(sin(time*0.5+phase), sin(time*0.4+phase*1.3), cos(time*0.45+phase*0.7)) * (length(off) * 0.15);
    vec4 mv = modelViewMatrix * vec4(center + r + wob, 1.0);
    float pulse = 0.7 + 0.3 * sin(time*0.6 + phase);
    gl_PointSize = clamp(size * pulse * (320.0 / -mv.z), 1.0, 400.0);
    vColor = acolor;
    vAlpha = pulse;
    gl_Position = projectionMatrix * mv;
  }`;

const _NEB_FS = `
  precision mediump float;
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    float d = length(gl_PointCoord - vec2(0.5));
    float a = smoothstep(0.5, 0.0, d);
    a *= a;                                   // soft core
    gl_FragColor = vec4(vColor, a * 0.22 * vAlpha);
  }`;

// Mulberry32 — deterministic PRNG so a nebula's scatter is stable across rebuilds.
function _rng(seed) {
  let a = seed >>> 0;
  return function () {
    a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Rebuild the combined nebula particle buffers from the current _terrainMeta.
function _buildNebula() {
  if (!_nebPoints) return;
  let n = 0;
  for (const [id, meta] of _terrainMeta) {
    if (!meta.nebula) continue;
    const idx = _terrainMap.get(id);
    if (idx === undefined || idx >= _terrainCount) continue;
    const b = idx * 3;
    const cx = _terrainPosBuf[b], cy = meta.y || 0, cz = _terrainPosBuf[b + 1];
    const R = meta.radius || 2000;
    const col = meta.color || [0.6, 0.6, 0.9], col2 = meta.color2 || col;
    const rng = _rng((meta.seed || 1) + idx);
    const K = Math.max(16, Math.min(90, Math.round((meta.density || 7) * 4)));
    for (let k = 0; k < K && n < _NEB_MAX; k++, n++) {
      const u = rng() * 2 - 1, t = rng() * Math.PI * 2, s = Math.sqrt(1 - u * u);
      const rr = R * Math.pow(rng(), 0.6);                 // centre-weighted
      const ox = rr * s * Math.cos(t), oy = rr * u * 0.55, oz = rr * s * Math.sin(t);
      const o3 = n * 3;
      _nebPosBuf[o3] = cx + ox; _nebPosBuf[o3+1] = cy + oy; _nebPosBuf[o3+2] = cz + oz;
      _nebCenBuf[o3] = cx;      _nebCenBuf[o3+1] = cy;      _nebCenBuf[o3+2] = cz;
      const tc = rng();                                    // two-tone: emission↔scattering
      _nebColBuf[o3]   = col[0] + (col2[0] - col[0]) * tc;
      _nebColBuf[o3+1] = col[1] + (col2[1] - col[1]) * tc;
      _nebColBuf[o3+2] = col[2] + (col2[2] - col[2]) * tc;
      _nebSizeBuf[n]  = R * (0.5 + rng() * 0.7);
      _nebPhaseBuf[n] = rng() * Math.PI * 2;
      _nebSwirlBuf[n] = meta.swirl || 0;
      _nebWarpBuf[n]  = meta.warp || 0;
    }
  }
  const g = _nebPoints.geometry;
  g.setDrawRange(0, n);
  for (const k of ['position','center','acolor','size','phase','swirlAmt','warpAmt'])
    g.attributes[k].needsUpdate = true;
}

function _initView3d() {
  if (typeof THREE === 'undefined' || !_view3dCanvas) return;
  try {
    _view3dRenderer = new THREE.WebGLRenderer({ canvas: _view3dCanvas, antialias: true });
  } catch (e) { log(`[3dview] no WebGL: ${e}`, 'err'); return; }
  _view3dRenderer.setClearColor(0x01030a, 1);
  _view3dScene  = new THREE.Scene();
  _view3dCamera = new THREE.PerspectiveCamera(55, 1, 1, 5e7);
  _m4 = new THREE.Matrix4(); _qrot = new THREE.Quaternion();
  _vpos = new THREE.Vector3(); _vscale = new THREE.Vector3();
  _UP = new THREE.Vector3(0, 1, 0);
  // Lights so the Phong ship meshes are shaded (points don't need them).
  _view3dScene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const _v3dSun = new THREE.DirectionalLight(0xffffff, 0.9);
  _v3dSun.position.set(1, 2, 1);
  _view3dScene.add(_v3dSun);

  _view3dPosBuf = new Float32Array(_V3D_MAX * 3);
  _view3dColBuf = new Float32Array(_V3D_MAX * 3);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(_view3dPosBuf, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(_view3dColBuf, 3));
  g.setDrawRange(0, 0);
  _view3dPoints = new THREE.Points(g,
    new THREE.PointsMaterial({ size: 10, vertexColors: true, sizeAttenuation: false }));
  _view3dScene.add(_view3dPoints);
  // Reference ground grid on the y=0 plane.
  _view3dScene.add(new THREE.GridHelper(400000, 80, 0x0f3a55, 0x08202e));

  // Starfield backdrop (follows the camera each frame).
  _view3dStars = _makeStarfield();
  _view3dScene.add(_view3dStars);

  // Nebula particle cloud (one Points/draw call for all nebulae).
  _nebPosBuf   = new Float32Array(_NEB_MAX * 3);
  _nebCenBuf   = new Float32Array(_NEB_MAX * 3);
  _nebColBuf   = new Float32Array(_NEB_MAX * 3);
  _nebSizeBuf  = new Float32Array(_NEB_MAX);
  _nebPhaseBuf = new Float32Array(_NEB_MAX);
  _nebSwirlBuf = new Float32Array(_NEB_MAX);
  _nebWarpBuf  = new Float32Array(_NEB_MAX);
  const ng = new THREE.BufferGeometry();
  ng.setAttribute('position', new THREE.BufferAttribute(_nebPosBuf, 3));
  ng.setAttribute('center',   new THREE.BufferAttribute(_nebCenBuf, 3));
  ng.setAttribute('acolor',   new THREE.BufferAttribute(_nebColBuf, 3));
  ng.setAttribute('size',     new THREE.BufferAttribute(_nebSizeBuf, 1));
  ng.setAttribute('phase',    new THREE.BufferAttribute(_nebPhaseBuf, 1));
  ng.setAttribute('swirlAmt', new THREE.BufferAttribute(_nebSwirlBuf, 1));
  ng.setAttribute('warpAmt',  new THREE.BufferAttribute(_nebWarpBuf, 1));
  ng.setDrawRange(0, 0);
  _nebMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: _NEB_VS, fragmentShader: _NEB_FS,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  _nebPoints = new THREE.Points(ng, _nebMat);
  _nebPoints.frustumCulled = false;
  _view3dScene.add(_nebPoints);

  // Flat ring used to highlight the viewer's own ship.
  _view3dHighlight = new THREE.Mesh(
    new THREE.RingGeometry(380, 460, 48),
    new THREE.MeshBasicMaterial({ color: 0x00e5ff, side: THREE.DoubleSide, transparent: true, opacity: 0.75 }));
  _view3dHighlight.rotation.x = -Math.PI / 2;   // lie flat on the XZ plane
  _view3dHighlight.visible = false;
  _view3dScene.add(_view3dHighlight);
}
_initView3d();

// Copy current radar object positions (x, z) onto the y=0 plane (x, 0, z).
function _view3dSync() {
  if (!_view3dPosBuf) return;
  let n = 0;
  for (let i = 0; i < _terrainCount && n < _V3D_MAX; i++) {
    // Skip terrain drawn as an asteroid instance; far ones keep their point.
    const tid = _terrainRevMap.get(i);
    if (tid !== undefined && _view3dMeshedIds.has(tid)) continue;
    const tm = tid !== undefined ? _terrainMeta.get(tid) : undefined;
    if (tm && tm.nebula) continue;   // nebulae render as the particle cloud, not a point
    const b = i * 3, o = n * 3;
    _view3dPosBuf[o] = _terrainPosBuf[b]; _view3dPosBuf[o+1] = (tm && tm.y) || 0; _view3dPosBuf[o+2] = _terrainPosBuf[b+1];
    _view3dColBuf[o] = _terrainColBuf[b]; _view3dColBuf[o+1] = _terrainColBuf[b+1]; _view3dColBuf[o+2] = _terrainColBuf[b+2];
    n++;
  }
  for (let i = 0; i < _dynamicCount && n < _V3D_MAX; i++) {
    // Skip objects drawn as a ship instance; far ones keep their point marker.
    const id  = _dynamicRevMap.get(i);
    if (id !== undefined && _view3dMeshedIds.has(id)) continue;
    const b = i * 3, o = n * 3;
    _view3dPosBuf[o] = _dynamicPosBuf[b]; _view3dPosBuf[o+1] = 0; _view3dPosBuf[o+2] = _dynamicPosBuf[b+1];
    _view3dColBuf[o] = _dynamicColBuf[b]; _view3dColBuf[o+1] = _dynamicColBuf[b+1]; _view3dColBuf[o+2] = _dynamicColBuf[b+2];
    n++;
  }
  _view3dPoints.geometry.setDrawRange(0, n);
  _view3dPoints.geometry.attributes.position.needsUpdate = true;
  _view3dPoints.geometry.attributes.color.needsUpdate    = true;
}

// Grow/create an art group's InstancedMesh so it can hold `count` instances.
// Geometry + material are shared from the base mesh, so growing only reallocates
// the per-instance matrix buffer.
function _ensureInst(g, count) {
  if (g.inst && g.cap >= count) return g.inst;
  if (!g.base) return null;
  if (g.inst) { _view3dScene.remove(g.inst); if (g.inst.dispose) g.inst.dispose(); }
  let cap = g.cap || 16;
  while (cap < count) cap *= 2;
  const inst = new THREE.InstancedMesh(g.base.geometry, g.base.material, cap);
  inst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  inst.frustumCulled = false;   // instances are spread out; the origin-based cull would be wrong
  _view3dScene.add(inst);
  g.inst = inst; g.cap = cap;
  return inst;
}

// Draw every near object (ships + asteroids) as per-art instances. Far objects
// and arts not yet loaded fall back to the point layer. Records meshed ids in
// _view3dMeshedIds so _view3dSync can skip them.
function _view3dSyncInstances() {
  const cam = _v3dDispCam;
  const lod2 = _V3D_LOD_NEAR * _V3D_LOD_NEAR;
  _view3dMeshedIds.clear();
  const byArt = new Map();   // art → [{x,y,z,sc,q,fx,fz}]

  function consider(id, art, x, y, z, sc, q, fx, fz) {
    if (!art) return;
    if (cam) {
      const dx = x-cam[0], dy = y-cam[1], dz = z-cam[2];
      if (dx*dx + dy*dy + dz*dz >= lod2) return;   // far → point
    }
    let g = _instArt.get(art);
    if (!g) {
      g = { base: null, inst: null, cap: 0, pending: true, failed: false };
      _instArt.set(art, g);
      loadShipMesh(art).then(base => {
        const cur = _instArt.get(art);
        if (cur) { cur.base = base || null; cur.pending = false; cur.failed = !base; }
      });
    }
    if (!g.base) return;   // not loaded yet → stays a point
    let arr = byArt.get(art);
    if (!arr) { arr = []; byArt.set(art, arr); }
    arr.push({ x, y, z, sc, q, fx, fz });
    _view3dMeshedIds.add(id);
  }

  for (const [id, meta] of _dynamicMeta) {
    const idx = _dynamicMap.get(id);
    if (idx === undefined || idx >= _dynamicCount || !meta.art) continue;
    const b = idx * 3;
    consider(id, meta.art, _dynamicPosBuf[b], meta.y || 0, _dynamicPosBuf[b+1],
             meta.meshscale || 1, meta.q, meta.fx, meta.fz);
  }
  for (const [id, meta] of _terrainMeta) {
    const idx = _terrainMap.get(id);
    if (idx === undefined || idx >= _terrainCount || !meta.art) continue;
    const b = idx * 3;
    consider(id, meta.art, _terrainPosBuf[b], meta.y || 0, _terrainPosBuf[b+1],
             meta.meshscale || 1, meta.q, 0, 1);
  }

  for (const [art, g] of _instArt) {
    const arr = byArt.get(art);
    const count = arr ? arr.length : 0;
    if (count === 0) { if (g.inst) g.inst.count = 0; continue; }
    const inst = _ensureInst(g, count);
    if (!inst) continue;
    for (let i = 0; i < count; i++) {
      const o = arr[i];
      _vpos.set(o.x, o.y, o.z);
      if (o.q) _qrot.set(o.q[1], o.q[2], o.q[3], o.q[0]);
      else _qrot.setFromAxisAngle(_UP, Math.atan2(o.fx, o.fz) + _MESH_YAW_OFFSET);
      _vscale.set(o.sc, o.sc, o.sc);
      _m4.compose(_vpos, _qrot, _vscale);
      inst.setMatrixAt(i, _m4);
    }
    inst.count = count;
    inst.instanceMatrix.needsUpdate = true;
  }
}

function _renderView3d() {
  if (!_view3dActive || !_view3dRenderer) return;
  // Render at the canvas's actual on-screen size (set by its rect), not the whole
  // window — so a script-sized 3dview has correct resolution and aspect.
  const W = _view3dCanvas.clientWidth  || window.innerWidth;
  const H = _view3dCanvas.clientHeight || window.innerHeight;
  if (_view3dCanvas.width !== W)  _view3dCanvas.width  = W;
  if (_view3dCanvas.height !== H) _view3dCanvas.height = H;
  _view3dSyncInstances();   // before _view3dSync so meshed objects drop their point
  _view3dSync();
  if (_nebMat) _nebMat.uniforms.time.value = performance.now() / 1000;
  // Smooth camera moves so scripted cuts / ship motion ease rather than snap.
  if (_v3dDispCam === null) { _v3dDispCam = _v3dCam.slice(); _v3dDispTgt = _v3dTgt.slice(); }
  const L = 0.12;
  // Always ease the look-at toward the server target (so manual orbit tracks the ship).
  for (let i = 0; i < 3; i++) _v3dDispTgt[i] += (_v3dTgt[i] - _v3dDispTgt[i]) * L;
  if (_v3dManual) {
    // Orbit around the target from the user's yaw/pitch/distance.
    const t = _v3dDispTgt, cp = Math.cos(_v3dPitch), sp = Math.sin(_v3dPitch);
    _v3dDispCam[0] = t[0] + _v3dDist * cp * Math.sin(_v3dYaw);
    _v3dDispCam[1] = t[1] + _v3dDist * sp;
    _v3dDispCam[2] = t[2] + _v3dDist * cp * Math.cos(_v3dYaw);
  } else {
    for (let i = 0; i < 3; i++) _v3dDispCam[i] += (_v3dCam[i] - _v3dDispCam[i]) * L;
  }
  _view3dCamera.aspect = W / H;
  _view3dCamera.updateProjectionMatrix();
  _view3dCamera.position.set(_v3dDispCam[0], _v3dDispCam[1], _v3dDispCam[2]);
  _view3dCamera.lookAt(_v3dDispTgt[0], _v3dDispTgt[1], _v3dDispTgt[2]);

  // Keep the starfield / skybox centred on the camera so they read as at infinity.
  if (_view3dStars)  _view3dStars.position.set(_v3dDispCam[0], _v3dDispCam[1], _v3dDispCam[2]);
  if (_skyboxMesh)   _skyboxMesh.position.set(_v3dDispCam[0], _v3dDispCam[1], _v3dDispCam[2]);

  // Highlight the viewer's own ship with the flat ring.
  if (_view3dHighlight) {
    const idx = _myShipId ? _dynamicMap.get(_myShipId) : undefined;
    if (idx !== undefined && idx < _dynamicCount) {
      const b = idx * 3;
      const m = _dynamicMeta.get(_myShipId);
      _view3dHighlight.position.set(_dynamicPosBuf[b], (m && m.y || 0) - 4, _dynamicPosBuf[b + 1]);
      _view3dHighlight.visible = true;
    } else {
      _view3dHighlight.visible = false;
    }
  }

  _view3dRenderer.setSize(W, H, false);
  _view3dRenderer.render(_view3dScene, _view3dCamera);
}

// Drive the cinematic view from its own RAF loop so the camera lerps smoothly
// between the (slower) per-tick server updates.
(function _startView3dLoop() {
  if (!_view3dRenderer) return;
  function loop() { requestAnimationFrame(loop); _renderView3d(); }
  loop();
})();

// ── cmdCinematic — show/hide the 3dview and update its camera ─────────────────
function cmdCinematic(msg) {
  // Transient broadcast: keep only messages addressed to our own client.
  if (CLIENT_ID !== null && String(msg.clientID) !== String(CLIENT_ID)) return;
  _view3dActive = !!msg.active;
  if (_view3dCanvas) {
    _view3dCanvas.style.display = _view3dActive ? 'block' : 'none';
    // Position the 3D canvas to the script-set rect (screen %), or the default
    // (top inset clears the topbar).  Coords are % of viewport → vw/vh.
    if (Array.isArray(msg.rect)) {
      const [l, t, r, b] = msg.rect;
      _view3dCanvas.style.left   = l + 'vw';
      _view3dCanvas.style.top    = t + 'vh';
      _view3dCanvas.style.width  = (r - l) + 'vw';
      _view3dCanvas.style.height = (b - t) + 'vh';
    }
  }
  if (Array.isArray(msg.cam))    _v3dCam = msg.cam;
  if (Array.isArray(msg.target)) _v3dTgt = msg.target;
}

// ── 3dview manual orbit camera (debug look-around) ────────────────────────────
// Seed yaw/pitch/distance from the current cinematic camera so manual mode
// continues smoothly from wherever the server left it.
function _v3dEnterManual() {
  if (_v3dDispCam && _v3dDispTgt) {
    const dx = _v3dDispCam[0]-_v3dDispTgt[0], dy = _v3dDispCam[1]-_v3dDispTgt[1], dz = _v3dDispCam[2]-_v3dDispTgt[2];
    _v3dDist  = Math.max(100, Math.hypot(dx, dy, dz));
    _v3dPitch = Math.asin(Math.max(-1, Math.min(1, dy / _v3dDist)));
    _v3dYaw   = Math.atan2(dx, dz);
  }
  _v3dManual = true;
}
// Engage only over the 3dview: active, not over a radar view, not on a GUI widget.
function _v3dCanGrab(e) {
  return _view3dActive && !_pointInRadarView(e.clientX, e.clientY)
      && !(e.target && e.target.closest && e.target.closest('.widget'));
}
window.addEventListener('mousedown', e => {
  if (e.button !== 0 || !_v3dCanGrab(e)) return;
  _v3dDrag = true; _v3dDragX = e.clientX; _v3dDragY = e.clientY;
  if (!_v3dManual) _v3dEnterManual();
});
window.addEventListener('mousemove', e => {
  if (!_v3dDrag) return;
  _v3dYaw   -= (e.clientX - _v3dDragX) * 0.005;
  _v3dPitch  = Math.max(-1.5, Math.min(1.5, _v3dPitch + (e.clientY - _v3dDragY) * 0.005));
  _v3dDragX = e.clientX; _v3dDragY = e.clientY;
});
window.addEventListener('mouseup', () => { _v3dDrag = false; });
window.addEventListener('dblclick', e => {
  // Double-click the 3dview (not the radar) to return to the cinematic camera.
  if (_view3dActive && !_pointInRadarView(e.clientX, e.clientY)) _v3dManual = false;
});


// ── init ──────────────────────────────────────────────────────────────────────
function sendScreenSize() {
  if (ws && ws.readyState === WebSocket.OPEN && CLIENT_ID !== null)
    ws.send(JSON.stringify({ type: 'screen_size', clientID: String(CLIENT_ID),
                             width: window.innerWidth, height: window.innerHeight }));
}

function cmdInit(msg) {
  CLIENT_ID = msg.clientID;
  document.getElementById('mode-label').textContent = _mode;
  document.getElementById('cid-val').textContent = CLIENT_ID;
  log(`  mode=${_mode} clientID=${CLIENT_ID}`, 'ev');
  sendScreenSize();
}

let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(sendScreenSize, 250);
});

// ── pct helper ────────────────────────────────────────────────────────────────
function pct(v) { return v.toFixed(4) + '%'; }

function placeRoot(el, left, top, right, bottom) {
  el.style.left   = pct(left);
  el.style.top    = pct(top);
  el.style.width  = pct(right - left);
  el.style.height = pct(bottom - top);
}

// ── clear ─────────────────────────────────────────────────────────────────────
function _clearRegionChildren(parentTag) {
  for (const k of Object.keys(_regions)) {
    if (k !== "" && _regions[k].parentTag === parentTag) {
      _clearRegionChildren(k);
      delete _regions[k];
    }
  }
}

function cmdClear(msg) {
  const tag = msg.tag || "";
  if (tag === "") {
    // Root clear: wipe the whole client tree.
    // Also clear radar view registrations — they'll be re-registered when the
    // new page's 2dview widgets are appended during the upcoming rebuild.
    _widgetRects.clear();
    _regions[""].back.innerHTML = '';
    _regions[""].inProgress = true;
    for (const k of Object.keys(_regions)) { if (k !== "") delete _regions[k]; }
    log(`  clear root → back wiped, all sub-regions discarded`, 'dbg');
  } else {
    const region = _regions[tag];
    if (!region) { log(`  clear: unknown region "${tag}"`, 'err'); return; }
    region.back.innerHTML = '';
    region.inProgress = true;
    _clearRegionChildren(tag);
    log(`  clear region="${tag}" → back wiped`, 'dbg');
  }
}

// ── complete ──────────────────────────────────────────────────────────────────
function cmdComplete(msg) {
  const tag = msg.tag || "";
  const region = _regions[tag];
  if (!region) { log(`  complete: unknown region "${tag}"`, 'err'); return; }

  region.front.classList.replace('front', 'back');
  region.back.classList.replace('back',  'front');
  [region.front, region.back] = [region.back, region.front];
  region.inProgress = false;

  log(`  complete region="${tag || 'root'}" → swapped (${region.back.children.length} old children now in back)`, 'dbg');
}

// ── Style string parser ───────────────────────────────────────────────────────
// Format: "key:value;key:value;..."
// Values may be enclosed in backticks to include literal semicolons/colons:
//   text:`Hello; World`  →  { text: "Hello; World" }
function parseStyle(styleStr) {
  if (!styleStr) return {};
  const r = {};

  // Split on ';' but not inside backtick-quoted values
  const pairs = [];
  let cur = '', inBt = false;
  for (let i = 0; i < styleStr.length; i++) {
    const ch = styleStr[i];
    if (ch === '`')            { inBt = !inBt; cur += ch; }
    else if (ch === ';' && !inBt) { pairs.push(cur); cur = ''; }
    else                       { cur += ch; }
  }
  if (cur) pairs.push(cur);

  pairs.forEach(p => {
    const i = p.indexOf(':');
    if (i > 0) {
      const key = p.slice(0, i).trim();
      let val = p.slice(i + 1).trim();
      // Strip optional backtick enclosure
      if (val.startsWith('`') && val.endsWith('`') && val.length >= 2)
        val = val.slice(1, -1);
      r[key] = val;
    }
  });
  return r;
}

// True for Artemis boolean flag values: on / yes / True / active
function isOn(v) { return v != null && /^(on|yes|true|active)$/i.test(String(v).trim()); }

// ── cmdSubRegion ──────────────────────────────────────────────────────────────
// Creates or updates a named child region. Regions have their own front/back
// buffer pair and can be independently rebuilt with clear(tag)/complete(tag).
function cmdSubRegion(msg, s) {
  const { tag, parent, left, top, right, bottom } = msg;
  const parentRegion = _regions[parent != null ? parent : ""] || _regions[""];

  let entry = _regions[tag];
  if (!entry) {
    const front = document.createElement('div'); front.className = 'region-buffer front';
    const back  = document.createElement('div'); back.className  = 'region-buffer back';
    const container = document.createElement('div'); container.className = 'region-container';
    if (tag) container.dataset.tag = tag;
    container.append(front, back);
    entry = { container, front, back, inProgress: false, parentTag: parent || "" };
    _regions[tag] = entry;
    // Add to parent's active buffer (back if rebuilding, front otherwise)
    const dest = parentRegion.inProgress ? parentRegion.back : parentRegion.front;
    dest.appendChild(container);
    log(`  +sub_region tag="${tag}" → region[${parent||'root'}] ${parentRegion.inProgress ? 'back' : 'front'}`, 'dbg');
  } else {
    log(`  ~sub_region tag="${tag}" (reposition)`, 'dbg');
  }
  placeRoot(entry.container, left, top, right, bottom);
}

// ── cmdWidget ─────────────────────────────────────────────────────────────────
function cmdWidget(msg) {
  const { cmd, tag, parent, left, top, right, bottom } = msg;
  const s = parseStyle(msg.style);

  // sub_region registers a child region; not a normal placeable widget
  if (cmd === 'sub_region') { cmdSubRegion(msg, s); return; }

  const el = buildWidget(msg, s);
  if (!el) return;

  el.classList.add('widget');
  if (tag) el.dataset.tag = tag;
  el.style.zIndex = s.draw_layer || 1001;  // engine default is 1001

  const region = _regions[parent != null ? parent : ""] || _regions[""];

  // In-place update: outside a rebuild, replace the existing element in the
  // region's live front buffer.
  if (tag && !region.inProgress) {
    const existing = region.front.querySelector(`[data-tag="${CSS.escape(tag)}"]`);
    if (existing) {
      el.style.left   = existing.style.left;
      el.style.top    = existing.style.top;
      el.style.width  = existing.style.width;
      el.style.height = existing.style.height;
      existing.parentNode.replaceChild(el, existing);
      log(`  ~${cmd} tag=${tag} → region[${parent||'root'}] front (in-place)`, 'dbg');
      return;
    }
    // No matching element in front and not inside a rebuild — stale update, discard.
    // Appending to the back would accumulate hidden elements that surface on the next
    // buffer swap and can intercept clicks as invisible clickregions.
    log(`  ?${cmd} tag=${tag} → stale out-of-rebuild update, discarding`, 'dbg');
    return;
  }

  // Rebuild path: append to the region's back buffer.
  // Coordinates are always relative to the region container — no toRoot needed.
  if (isOn(s.pixel_aligned)) {
    el.style.left   = left + 'px';
    el.style.top    = top + 'px';
    el.style.width  = (right - left) + 'px';
    el.style.height = (bottom - top) + 'px';
  } else {
    placeRoot(el, left, top, right, bottom);
  }

  // 2D engine-view widgets have no visual content in the mockgui; instead register
  // their position so the radar overlay canvas can draw the tactical map in that slot.
  if (_2D_VIEW_WIDGET_TYPES.has(cmd)) {
    const r = _resolve2dViewRect(left, top, right, bottom);
    _widgetRects.set(cmd, { left: r.left, top: r.top, right: r.right, bottom: r.bottom, ts: performance.now() });
    log(`  [radar] 2dview rect registered for ${cmd} (${pct(r.left)},${pct(r.top)})→(${pct(r.right)},${pct(r.bottom)})`, 'dbg');
  }
  region.back.appendChild(el);
  log(`  +${cmd} tag=${tag} → region[${parent||'root'}] back [${pct(left)},${pct(top)},${pct(right-left)},${pct(bottom-top)}]`, 'dbg');
}

// ── ctext ─────────────────────────────────────────────────────────────────────
// Cosmos uses ^ as a newline separator in text strings.
function ctext(s) { return s ? s.replace(/\^/g, '\n') : s; }

// ── applyFont ─────────────────────────────────────────────────────────────────
// Maps Cosmos font tags to the Goldman font families and sizes from preferences.json.
const _FONT_MAP = {
  'smallest': { family: 'GoldmanSansCd_Rg', size: 18 },
  'gui-1':    { family: 'GoldmanSansCd_Rg', size: 22 },
  'gui-2':    { family: 'GoldmanSansCd_Rg', size: 24 },
  'gui-2A':   { family: 'GoldmanSansCd_Rg', size: 28 },
  'gui-3':    { family: 'Goldman-Bold',      size: 28 },
  'gui-4':    { family: 'Goldman-Bold',      size: 32 },
  'gui-5':    { family: 'Goldman-Bold',      size: 36 },
  'gui-6':    { family: 'Goldman-Bold',      size: 52 },
};
function applyFont(el, tag) {
  const f = _FONT_MAP[tag];
  if (f) { el.style.fontFamily = f.family; el.style.fontSize = f.size + 'px'; }
  else   { el.style.fontFamily = tag; }
}

// ── buildWidget ───────────────────────────────────────────────────────────────
// s = parsed style object from parseStyle(msg.style)
function buildWidget(msg, s) {
  // Cosmos stores widget text under '$text' key (backtick-quoted in the style string).
  // Normalise it to 'text' so the rest of buildWidget works without changes.
  if (s['$text'] !== undefined) s.text = s['$text'];
  const { cmd, tag } = msg;
  let el;
  switch (cmd) {
    case 'button': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('button');
      el.className = 'w-button';
      el.textContent = ctext(s.text) || tag;
      if (s.color) el.style.color = s.color;
      if (s.font)  applyFont(el, s.font);
      el.addEventListener('click', () => sendEvent('gui_message', tag, ownerId));
      break;
    }
    case 'checkbox': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('label');
      el.className = 'w-checkbox';
      const cb = document.createElement('input'); cb.type = 'checkbox';
      cb.checked = isOn(s.state);
      if (s.visible !== undefined && !isOn(s.visible)) el.style.visibility = 'hidden';
      const sp = document.createElement('span');
      sp.textContent = ctext(s.text) || tag;
      if (s.color) sp.style.color = s.color;
      if (s.font)  applyFont(sp, s.font);
      el.append(cb, sp);
      cb.addEventListener('change', () => sendEvent('gui_message', tag, ownerId, { checked: cb.checked }));
      break;
    }
    case 'clickregion': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('div'); el.className = 'w-clickregion';
      if (s.background_color) el.style.setProperty('--cr-hover-bg', s.background_color.trim());
      if (s.text) {
        const span = document.createElement('span'); span.className = 'cr-hover-text';
        span.textContent = ctext(s.text);
        if (s.color) span.style.color = s.color;
        if (s.font)  applyFont(span, s.font);
        el.appendChild(span);
      }
      el.addEventListener('click', () => sendEvent('gui_message', tag, ownerId));
      break;
    }
    case 'colorbutton': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('div'); el.className = 'w-colorbutton';
      const btnColor = (s.color || '#4f8ef7').trim();
      el.style.backgroundColor = btnColor; el.title = tag;
      el.addEventListener('click', () => sendEvent('gui_message', tag, ownerId, { color: btnColor }));
      break;
    }
    case 'colorcheckbox': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('label'); el.className = 'w-colorcheckbox';
      const sw = document.createElement('div'); sw.className = 'swatch';
      const chkColor = s.color || '#4f8ef7';
      sw.style.background = chkColor;
      const cb2 = document.createElement('input'); cb2.type = 'checkbox'; cb2.style.display = 'none';
      el.append(sw, cb2);
      el.addEventListener('click', () => { cb2.checked = !cb2.checked; sendEvent('change', tag, ownerId, { checked: cb2.checked, color: chkColor }); });
      break;
    }
    case 'dropdown': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('div'); el.className = 'w-dropdown';
      const sel = document.createElement('select');
      (s.list || s.text || tag).split(',').forEach(o => {
        const opt = document.createElement('option'); opt.value = opt.textContent = o.trim(); sel.appendChild(opt);
      });
      if (s.color) sel.style.color = s.color;
      if (s.font)  applyFont(sel, s.font);
      el.appendChild(sel);
      sel.addEventListener('change', () => sendEvent('change', tag, ownerId, { value: sel.value }));
      break;
    }
    case 'face': {
      el = document.createElement('div'); el.className = 'w-face';
      const fcanvas = document.createElement('canvas');
      fcanvas.style.cssText = 'display:block;width:100%;height:100%;';
      el.appendChild(fcanvas);
      const fctx = fcanvas.getContext('2d');
      const flayers = _parseFaceString(msg.face_string);
      new ResizeObserver(entries => {
        const rc = entries[0].contentRect;
        const rw = Math.round(rc.width), rh = Math.round(rc.height);
        if (rw <= 0 || rh <= 0) return;
        fcanvas.width = rw; fcanvas.height = rh;
        _drawFace(fcanvas, fctx, flayers);
      }).observe(el);
      // Preload all referenced sheets early
      [...new Set(flayers.map(l => l.alias))].forEach(a => _getFaceSheet(a, () => {}));
      break;
    }
    case 'icon': {
      const ownerId = msg.clientID ?? 0;
      el = _buildIconWidget(s, tag, ownerId, 'w-icon', false, false);
      break;
    }
    case 'iconbutton': {
      const ownerId = msg.clientID ?? 0;
      el = _buildIconWidget(s, tag, ownerId, 'w-iconbutton', true, false);
      break;
    }
    case 'iconcheckbox': {
      const ownerId = msg.clientID ?? 0;
      el = _buildIconWidget(s, tag, ownerId, 'w-iconcheckbox', false, true);
      break;
    }
    case 'image': {
      el = _buildImageWidget(s);
      break;
    }
    case 'rawiconbutton': {
      const ownerId = msg.clientID ?? 0;
      el = _buildIconWidget(s, tag, ownerId, 'w-rawiconbutton', true, false);
      break;
    }
    case 'slider': {
      const ownerId = msg.clientID ?? 0;
      const isVertical = (msg.bottom - msg.top) > (msg.right - msg.left);
      const low = +(s.low ?? 0), high = +(s.high ?? 100);
      const isInt = Number.isInteger(low) && Number.isInteger(high);
      let cur = +(msg.current ?? (low + high) / 2);
      let lastFired = isInt ? Math.round(cur) : cur;

      el = document.createElement('div'); el.className = isVertical ? 'w-slider vertical' : 'w-slider';

      const track = document.createElement('div'); track.className = 'slider-track';
      const thumb = document.createElement('div'); thumb.className = 'slider-thumb';
      track.appendChild(thumb);

      // Number label — horizontal only, respect show_number flag
      const hideNum = isVertical || (s.show_number !== undefined && !isOn(s.show_number));
      let numEl = null;
      if (!hideNum) {
        numEl = document.createElement('span'); numEl.className = 'slider-num';
        numEl.textContent = isInt ? Math.round(cur) : cur.toFixed(1);
        if (s.color) numEl.style.color = s.color;
        el.append(track, numEl);
      } else {
        el.appendChild(track);
      }

      const updateThumb = v => {
        let frac = Math.max(0, Math.min(1, (v - low) / (high - low || 1)));
        if (isVertical) { frac = 1 - frac; thumb.style.top  = (frac * 100).toFixed(3) + '%'; }
        else            {                   thumb.style.left = (frac * 100).toFixed(3) + '%'; }
        if (numEl) numEl.textContent = isInt ? Math.round(v) : v.toFixed(1);
      };
      updateThumb(cur);

      const fireChange = v => {
        if (isInt) {
          const iv = Math.round(v);
          if (iv === lastFired) return;
          lastFired = iv;
          sendEvent('change', tag, ownerId, { value: iv });
        } else {
          sendEvent('change', tag, ownerId, { value: v });
        }
      };

      // Click track to jump
      track.addEventListener('click', e => {
        if (e.target === thumb) return;
        const rect = track.getBoundingClientRect();
        let frac = isVertical
          ? Math.max(0, Math.min(1, 1 - (e.clientY - rect.top)  / rect.height))
          : Math.max(0, Math.min(1,     (e.clientX - rect.left) / rect.width));
        cur = low + frac * (high - low);
        updateThumb(cur);
        fireChange(cur);
      });

      // Drag thumb — capture span at pointerdown while track is live; use document
      // listeners so overlapping widgets can't block the drag mid-move.
      thumb.addEventListener('pointerdown', e => {
        const rect = track.getBoundingClientRect();
        const span = isVertical ? rect.height : rect.width;
        if (span <= 0) return;
        const startPos = isVertical ? e.clientY : e.clientX;
        const startVal = cur;
        const dir = isVertical ? -1 : 1;
        e.stopPropagation(); e.preventDefault();

        function onMove(e) {
          const moved = (isVertical ? e.clientY : e.clientX) - startPos;
          cur = Math.max(low, Math.min(high, startVal + dir * moved / span * (high - low)));
          updateThumb(cur);
          fireChange(cur);
        }
        function onUp() {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
        }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
      break;
    }
    case 'text': {
      el = document.createElement('div'); el.className = 'w-text';
      el.textContent = ctext(s.text) || tag;
      if (s.color) el.style.color = s.color;
      if (s.font)  applyFont(el, s.font);
      if (s.justify) {
        const jmap = { left: 'flex-start', right: 'flex-end', center: 'center' };
        const j = jmap[s.justify.toLowerCase()];
        if (j) { el.style.justifyContent = j; el.style.alignItems = j; el.style.textAlign = s.justify; }
      }
      break;
    }
    case 'typein': {
      const ownerId = msg.clientID ?? 0;
      el = document.createElement('div'); el.className = 'w-typein';
      const inp = document.createElement('input');
      inp.type = isOn(s.password) ? 'password' : 'text';
      inp.placeholder = s.desc || '';
      if (s.text)  inp.value = s.text;
      if (s.color) inp.style.color = s.color;
      if (s.font)  applyFont(inp, s.font);
      el.appendChild(inp);
      inp.addEventListener('change',  () => sendEvent('change', tag, ownerId, { value: inp.value }));
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendEvent('submit', tag, ownerId, { value: inp.value }); });
      break;
    }
    case 'hotkey': {
      const ownerId = msg.clientID ?? 0;
      document.addEventListener('keydown', e => {
        if (e.key === msg.keyType || e.code === msg.keyType)
          sendEvent('hotkey', tag, ownerId, { keyType: msg.keyType, category: msg.category });
      });
      return null;
    }
    case '3dship': {
      return _build3dship(msg);
    }
    default: {
      el = document.createElement('div'); el.className = 'w-text';
      el.style.outline = '1px dashed red';
      el.textContent = `[unknown:${cmd}]`;
    }
  }
  return el;
}
